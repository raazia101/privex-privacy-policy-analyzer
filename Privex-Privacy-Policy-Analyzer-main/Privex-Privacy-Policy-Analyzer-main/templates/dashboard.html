<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #1f2937;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #6b7280;
            font-size: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-card h3 {
            color: #6b7280;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .stat-card .change {
            font-size: 12px;
            color: #6b7280;
        }

        .high-risk { color: #ef4444; }
        .medium-risk { color: #f59e0b; }
        .low-risk { color: #10b981; }
        .total { color: #3b82f6; }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #1f2937;
            font-size: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sites-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .site-item {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .site-item:hover {
            border-color: #3b82f6;
            box-shadow: 0 2px 4px rgba(59, 130, 246, 0.1);
        }

        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .site-url {
            font-weight: 600;
            color: #1f2937;
            font-size: 14px;
            word-break: break-all;
        }

        .risk-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .risk-high {
            background: #fee2e2;
            color: #dc2626;
        }

        .risk-medium {
            background: #fed7aa;
            color: #ea580c;
        }

        .risk-low {
            background: #d1fae5;
            color: #059669;
        }

        .risk-unknown {
            background: #f3f4f6;
            color: #6b7280;
        }

        .site-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 12px;
            color: #6b7280;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .data-category {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            margin-right: 4px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .category-personal { background: #fee2e2; color: #dc2626; }
        .category-contact { background: #fef3c7; color: #d97706; }
        .category-financial { background: #fee2e2; color: #dc2626; }
        .category-health { background: #fee2e2; color: #dc2626; }
        .category-technical { background: #e0e7ff; color: #4f46e5; }
        .category-behavioral { background: #f3e8ff; color: #9333ea; }
        .category-location { background: #dcfce7; color: #16a34a; }

        .insights-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
        }

        .insight-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .insight-concern { color: #dc2626; }
        .insight-positive { color: #059669; }
        .insight-neutral { color: #6b7280; }

        .enhanced-site-details {
            background: #f9fafb;
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
        }

        .detail-section {
            margin-bottom: 12px;
        }

        .detail-section h4 {
            font-size: 12px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .risk-breakdown {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            padding: 4px 8px;
            background: white;
            border-radius: 4px;
        }

        .breakdown-label {
            color: #6b7280;
        }

        .breakdown-value {
            font-weight: 600;
        }

        .positive-value { color: #059669; }
        .negative-value { color: #dc2626; }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: #2563eb;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function Dashboard() {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showEnhanced, setShowEnhanced] = useState(false);

            const loadData = async () => {
                try {
                    setLoading(true);
                    const response = await fetch('/api/dashboard');
                    const result = await response.json();
                    setData(result);
                } catch (error) {
                    console.error('Error loading data:', error);
                } finally {
                    setLoading(false);
                }
            };

            const loadEnhancedData = async () => {
                try {
                    setLoading(true);
                    const response = await fetch('/api/dashboard');
                    const result = await response.json();
                    
                    // Enhance site data with additional analysis
                    if (result.recent_sites) {
                        for (let site of result.recent_sites) {
                            try {
                                const detailResponse = await fetch(`/api/site/${site.url.replace('https://', '')}`);
                                if (detailResponse.ok) {
                                    const detailData = await detailResponse.json();
                                    // Merge enhanced data
                                    Object.assign(site, detailData);
                                }
                            } catch (error) {
                                console.warn(`Failed to load enhanced data for ${site.url}:`, error);
                            }
                        }
                    }
                    
                    setData(result);
                    setShowEnhanced(true);
                } catch (error) {
                    console.error('Error loading enhanced data:', error);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                loadData();
                const interval = setInterval(loadData, 30000); // Refresh every 30 seconds
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (data && data.recent_sites) {
                    // Create charts
                    createRiskChart(data);
                    createDataCollectionChart(data);
                }
            }, [data]);

            const createRiskChart = (chartData) => {
                const ctx = document.getElementById('riskChart');
                if (!ctx) return;

                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['High Risk', 'Medium Risk', 'Low Risk', 'Unknown'],
                        datasets: [{
                            data: [
                                chartData.stats.high_risk_sites,
                                chartData.stats.medium_risk_sites,
                                chartData.stats.low_risk_sites,
                                chartData.stats.total_sites - chartData.stats.high_risk_sites - chartData.stats.medium_risk_sites - chartData.stats.low_risk_sites
                            ],
                            backgroundColor: ['#ef4444', '#f59e0b', '#10b981', '#6b7280']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom'
                            }
                        }
                    }
                });
            };

            const createDataCollectionChart = (chartData) => {
                const ctx = document.getElementById('dataChart');
                if (!ctx) return;

                // Use data_type_frequency from database
                const dataTypes = chartData.data_type_frequency || [];
                
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: dataTypes.map(dt => dt.type),
                        datasets: [{
                            label: 'Sites Collecting This Data',
                            data: dataTypes.map(dt => dt.site_count),
                            backgroundColor: '#3b82f6'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            };

            if (loading) {
                return (
                    <div className="dashboard">
                        <div className="loading">
                            <div>Loading privacy data...</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="dashboard">
                    <div className="header">
                        <h1>Privacy Policy Dashboard</h1>
                        <p>Monitor how websites collect and use your data</p>
                    </div>

                    <div className="stats-grid">
                        <div className="stat-card">
                            <h3>Total Sites Analyzed</h3>
                            <div className="value total">{data.stats.total_sites}</div>
                            <div className="change">Sites tracked</div>
                        </div>
                        <div className="stat-card">
                            <h3>High Risk Sites</h3>
                            <div className="value high-risk">{data.stats.high_risk_sites}</div>
                            <div className="change">Require attention</div>
                        </div>
                        <div className="stat-card">
                            <h3>Medium Risk Sites</h3>
                            <div className="value medium-risk">{data.stats.medium_risk_sites}</div>
                            <div className="change">Moderate privacy concerns</div>
                        </div>
                        <div className="stat-card">
                            <h3>Low Risk Sites</h3>
                            <div className="value low-risk">{data.stats.low_risk_sites}</div>
                            <div className="change">Better privacy practices</div>
                        </div>
                    </div>

                    <div className="main-content">
                        <div className="card">
                            <h2>
                                <i data-lucide="globe"></i>
                                Recently Analyzed Sites
                            </h2>
                            <div className="sites-list">
                                {data.recent_sites.slice(0, 10).map((site, index) => (
                                    <div key={index} className="site-item">
                                        <div className="site-header">
                                            <div className="site-url">{site.url}</div>
                                            <span className={`risk-badge risk-${(site.risk_level || 'unknown').toLowerCase()}`}>
                                                {site.risk_level || 'Unknown'}
                                            </span>
                                        </div>
                                        <div className="site-details">
                                            <div className="detail-item">
                                                <i data-lucide="database" size="12"></i>
                                                {site.data_collected?.length || 0} data types
                                            </div>
                                            <div className="detail-item">
                                                <i data-lucide="share-2" size="12"></i>
                                                {site.shared_with?.length || 0} third parties
                                            </div>
                                            <div className="detail-item">
                                                <i data-lucide="target" size="12"></i>
                                                {site.purposes?.length || 0} purposes
                                            </div>
                                            <div className="detail-item">
                                                <i data-lucide="cookie" size="12"></i>
                                                {site.cookie_banner_detected ? 'Cookie banner' : 'No banner'}
                                            </div>
                                        </div>
                                        
                                        {/* Enhanced Data Categories Display */}
                                        {site.data_categories && (
                                            <div className="enhanced-site-details">
                                                <div className="detail-section">
                                                    <h4>Data Categories</h4>
                                                    <div>
                                                        {Object.entries(site.data_categories).map(([category, items]) => 
                                                            items && items.length > 0 ? (
                                                                <span key={category} className={`data-category category-${category.split('_')[0]}`}>
                                                                    {category.replace('_', ' ')} ({items.length})
                                                                </span>
                                                            ) : null
                                                        )}
                                                    </div>
                                                </div>
                                                
                                                {site.sharing_practices && (
                                                    <div className="detail-section">
                                                        <h4>Sharing Practices</h4>
                                                        <div>
                                                            {Object.entries(site.sharing_practices).map(([practice, items]) => 
                                                                items && items.length > 0 ? (
                                                                    <span key={practice} className="data-category category-technical">
                                                                        {practice.replace('_', ' ')} ({items.length})
                                                                    </span>
                                                                ) : null
                                                            )}
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                {site.risk_breakdown && (
                                                    <div className="detail-section">
                                                        <h4>Risk Breakdown</h4>
                                                        <div className="risk-breakdown">
                                                            {Object.entries(site.risk_breakdown).map(([factor, score]) => (
                                                                <div key={factor} className="breakdown-item">
                                                                    <span className="breakdown-label">{factor.replace('_', ' ')}</span>
                                                                    <span className={`breakdown-value ${score >= 0 ? 'negative-value' : 'positive-value'}`}>
                                                                        {score > 0 ? '+' : ''}{score}
                                                                    </span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                {site.insights && (
                                                    <div className="insights-section">
                                                        {site.insights.concerns && site.insights.concerns.length > 0 && (
                                                            <div className="detail-section">
                                                                <h4>Concerns</h4>
                                                                {site.insights.concerns.slice(0, 2).map((concern, idx) => (
                                                                    <div key={idx} className="insight-item insight-concern">
                                                                        <i data-lucide="alert-triangle" size="12"></i>
                                                                        <span>{concern}</span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                        
                                                        {site.insights.positive_aspects && site.insights.positive_aspects.length > 0 && (
                                                            <div className="detail-section">
                                                                <h4>Positive Aspects</h4>
                                                                {site.insights.positive_aspects.slice(0, 2).map((positive, idx) => (
                                                                    <div key={idx} className="insight-item insight-positive">
                                                                        <i data-lucide="check-circle" size="12"></i>
                                                                        <span>{positive}</span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="card">
                            <h2>
                                <i data-lucide="pie-chart"></i>
                                Risk Distribution
                            </h2>
                            <div className="chart-container">
                                <canvas id="riskChart"></canvas>
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <h2>
                            <i data-lucide="bar-chart"></i>
                            Data Collection Patterns
                        </h2>
                        <div className="chart-container">
                            <canvas id="dataChart"></canvas>
                        </div>
                    </div>

                    {showEnhanced && data && (
                        <div className="card">
                            <h2>
                                <i data-lucide="trending-up"></i>
                                Enhanced Privacy Insights
                            </h2>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '16px' }}>
                                <div style={{ textAlign: 'center', padding: '16px', background: '#f9fafb', borderRadius: '8px' }}>
                                    <h4 style={{ margin: '0 0 8px 0', color: '#6b7280', fontSize: '12px', textTransform: 'uppercase' }}>Sensitive Data Sites</h4>
                                    <div style={{ fontSize: '24px', fontWeight: 'bold', color: '#dc2626' }}>
                                        {data.recent_sites?.filter(site => 
                                            site.data_categories && (
                                                site.data_categories.personal_identifiers?.length > 0 ||
                                                site.data_categories.financial_data?.length > 0 ||
                                                site.data_categories.health_data?.length > 0
                                            )
                                        ).length || 0}
                                    </div>
                                </div>
                                <div style={{ textAlign: 'center', padding: '16px', background: '#f9fafb', borderRadius: '8px' }}>
                                    <h4 style={{ margin: '0 0 8px 0', color: '#6b7280', fontSize: '12px', textTransform: 'uppercase' }}>Marketing Sharing</h4>
                                    <div style={{ fontSize: '24px', fontWeight: 'bold', color: '#d97706' }}>
                                        {data.recent_sites?.filter(site => 
                                            site.sharing_practices?.marketing_partners?.length > 0
                                        ).length || 0}
                                    </div>
                                </div>
                                <div style={{ textAlign: 'center', padding: '16px', background: '#f9fafb', borderRadius: '8px' }}>
                                    <h4 style={{ margin: '0 0 8px 0', color: '#6b7280', fontSize: '12px', textTransform: 'uppercase' }}>User Rights Mentioned</h4>
                                    <div style={{ fontSize: '24px', fontWeight: 'bold', color: '#059669' }}>
                                        {data.recent_sites?.filter(site => 
                                            site.user_rights && site.user_rights.length > 0
                                        ).length || 0}
                                    </div>
                                </div>
                                <div style={{ textAlign: 'center', padding: '16px', background: '#f9fafb', borderRadius: '8px' }}>
                                    <h4 style={{ margin: '0 0 8px 0', color: '#6b7280', fontSize: '12px', textTransform: 'uppercase' }}>International Transfers</h4>
                                    <div style={{ fontSize: '24px', fontWeight: 'bold', color: '#4f46e5' }}>
                                        {data.recent_sites?.filter(site => 
                                            site.international_transfers && site.international_transfers.length > 0
                                        ).length || 0}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <div style={{ textAlign: 'center', marginTop: '20px', display: 'flex', gap: '12px', justifyContent: 'center' }}>
                        <button className="refresh-btn" onClick={loadData}>
                            <i data-lucide="refresh-cw" size="16"></i>
                            Refresh Data
                        </button>
                        <button className="refresh-btn" onClick={loadEnhancedData} style={{ background: '#059669' }}>
                            <i data-lucide="search" size="16"></i>
                            Load Enhanced Analysis
                        </button>
                    </div>
                </div>
            );
        }

        // Initialize Lucide icons
        lucide.createIcons();

        // Render the app
        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
