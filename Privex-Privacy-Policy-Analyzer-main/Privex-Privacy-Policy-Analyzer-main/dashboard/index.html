<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #1f2937;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #6b7280;
            font-size: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-card h3 {
            color: #6b7280;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .stat-card .change {
            font-size: 12px;
            color: #6b7280;
        }

        .high-risk { color: #ef4444; }
        .medium-risk { color: #f59e0b; }
        .low-risk { color: #10b981; }
        .total { color: #3b82f6; }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #1f2937;
            font-size: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sites-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .site-item {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .site-item:hover {
            border-color: #3b82f6;
            box-shadow: 0 2px 4px rgba(59, 130, 246, 0.1);
        }

        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .site-url {
            font-weight: 600;
            color: #1f2937;
            font-size: 14px;
            word-break: break-all;
        }

        .risk-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .risk-high {
            background: #fee2e2;
            color: #dc2626;
        }

        .risk-medium {
            background: #fed7aa;
            color: #ea580c;
        }

        .risk-low {
            background: #d1fae5;
            color: #059669;
        }

        .risk-unknown {
            background: #f3f4f6;
            color: #6b7280;
        }

        .site-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 12px;
            color: #6b7280;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: #2563eb;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function Dashboard() {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            const loadData = async () => {
                try {
                    setLoading(true);
                    const response = await chrome.runtime.sendMessage({ type: 'GET_ANALYSIS_DATA' });
                    setData(response);
                } catch (error) {
                    console.error('Error loading data:', error);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                loadData();
                const interval = setInterval(loadData, 30000); // Refresh every 30 seconds
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (data && data.sites) {
                    // Create charts
                    createRiskChart(data);
                    createDataCollectionChart(data);
                }
            }, [data]);

            const createRiskChart = (chartData) => {
                const ctx = document.getElementById('riskChart');
                if (!ctx) return;

                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['High Risk', 'Medium Risk', 'Low Risk', 'Unknown'],
                        datasets: [{
                            data: [
                                chartData.highRiskSites,
                                chartData.mediumRiskSites,
                                chartData.lowRiskSites,
                                chartData.totalSites - chartData.highRiskSites - chartData.mediumRiskSites - chartData.lowRiskSites
                            ],
                            backgroundColor: ['#ef4444', '#f59e0b', '#10b981', '#6b7280']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom'
                            }
                        }
                    }
                });
            };

            const createDataCollectionChart = (chartData) => {
                const ctx = document.getElementById('dataChart');
                if (!ctx) return;

                // Aggregate data collection types
                const dataTypes = {};
                chartData.sites.forEach(site => {
                    if (site.analysis && site.analysis.data) {
                        site.analysis.data.data_collected.forEach(type => {
                            dataTypes[type] = (dataTypes[type] || 0) + 1;
                        });
                    }
                });

                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: Object.keys(dataTypes),
                        datasets: [{
                            label: 'Sites Collecting This Data',
                            data: Object.values(dataTypes),
                            backgroundColor: '#3b82f6'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            };

            if (loading) {
                return (
                    <div className="dashboard">
                        <div className="loading">
                            <div>Loading privacy data...</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="dashboard">
                    <div className="header">
                        <h1>Privacy Policy Dashboard</h1>
                        <p>Monitor how websites collect and use your data</p>
                    </div>

                    <div className="stats-grid">
                        <div className="stat-card">
                            <h3>Total Sites Analyzed</h3>
                            <div className="value total">{data.totalSites}</div>
                            <div className="change">Sites tracked</div>
                        </div>
                        <div className="stat-card">
                            <h3>High Risk Sites</h3>
                            <div className="value high-risk">{data.highRiskSites}</div>
                            <div className="change">Require attention</div>
                        </div>
                        <div className="stat-card">
                            <h3>Medium Risk Sites</h3>
                            <div className="value medium-risk">{data.mediumRiskSites}</div>
                            <div className="change">Moderate privacy concerns</div>
                        </div>
                        <div className="stat-card">
                            <h3>Low Risk Sites</h3>
                            <div className="value low-risk">{data.lowRiskSites}</div>
                            <div className="change">Better privacy practices</div>
                        </div>
                    </div>

                    <div className="main-content">
                        <div className="card">
                            <h2>
                                <i data-lucide="globe"></i>
                                Recently Analyzed Sites
                            </h2>
                            <div className="sites-list">
                                {data.sites.slice(0, 10).map((site, index) => (
                                    <div key={index} className="site-item">
                                        <div className="site-header">
                                            <div className="site-url">{site.url}</div>
                                            <span className={`risk-badge risk-${(site.riskLevel || 'unknown').toLowerCase()}`}>
                                                {site.riskLevel || 'Unknown'}
                                            </span>
                                        </div>
                                        <div className="site-details">
                                            <div className="detail-item">
                                                <i data-lucide="database" size="12"></i>
                                                {site.analysis?.data?.data_collected?.length || 0} data types
                                            </div>
                                            <div className="detail-item">
                                                <i data-lucide="share-2" size="12"></i>
                                                {site.analysis?.data?.shared_with?.length || 0} third parties
                                            </div>
                                            <div className="detail-item">
                                                <i data-lucide="target" size="12"></i>
                                                {site.analysis?.data?.purpose?.length || 0} purposes
                                            </div>
                                            <div className="detail-item">
                                                <i data-lucide="cookie" size="12"></i>
                                                {site.cookieBannerDetected ? 'Cookie banner' : 'No banner'}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="card">
                            <h2>
                                <i data-lucide="pie-chart"></i>
                                Risk Distribution
                            </h2>
                            <div className="chart-container">
                                <canvas id="riskChart"></canvas>
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <h2>
                            <i data-lucide="bar-chart"></i>
                            Data Collection Patterns
                        </h2>
                        <div className="chart-container">
                            <canvas id="dataChart"></canvas>
                        </div>
                    </div>

                    <div style={{ textAlign: 'center', marginTop: '20px' }}>
                        <button className="refresh-btn" onClick={loadData}>
                            <i data-lucide="refresh-cw" size="16"></i>
                            Refresh Data
                        </button>
                    </div>
                </div>
            );
        }

        // Initialize Lucide icons
        lucide.createIcons();

        // Render the app
        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
